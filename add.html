<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жарнама қосу - Batyrsity</title>
    <style>
        :root { --blue: #007bff; --bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { display: block; margin-top: 15 shadow: 0 4px 15px rgba(0,0,0,0.1); }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .upload-btn { border: 2px dashed var(--blue); padding: 20px; text-align: center; border-radius: 15px; margin-top: 20px; cursor: pointer; color: var(--blue); font-weight: bold; }
        #preview { width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
        button { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Жаңа хабарландыру</h2>
    
    <label>Бөлімді таңдаңыз:</label>
    <select id="mainCat">
        <option value="">-- Бөлімді таңдау --</option>
        <option value="market">🛒 Маркет</option>
        <option value="jobs">💼 Жұмыс</option>
        <option value="services">🛠 Сервистер</option>
    </select>

    <label>Категория:</label>
    <select id="subCat">
        <option value="">-- Алдымен бөлімді таңдаңыз --</option>
    </select>

    <input type="text" id="title" placeholder="Тауар немесе қызмет атауы" style="margin-top:20px;">
    <input type="number" id="price" placeholder="Бағасы (₸)">
    <input type="tel" id="phone" placeholder="Телефон (мысалы: 8707...)">
    <textarea id="desc" placeholder="Толық сипаттамасы (міндетті емес)" rows="3"></textarea>

    <div class="upload-btn" onclick="document.getElementById('imgInp').click()">
        📸 Сурет жүктеу
        <input type="file" id="imgInp" accept="image/*" hidden>
    </div>
    <img id="preview">

    <button id="sendBtn">Жариялау</button>
    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaIwrxsSc4s4SV_sIfOwcGaeB6obdpuzE",
        authDomain: "batyr-final.firebaseapp.com",
        projectId: "batyr-final",
        storageBucket: "batyr-final.appspot.com",
        messagingSenderId: "621519255228",
        appId: "1:621519255228:web:6087e026a6db84afa2c2b9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // 1. КАТЕГОРИЯЛАРДЫ БАЗАДАН АВТОМАТТЫ ТҮРДЕ АЛУ
    const mainSelect = document.getElementById('mainCat');
    const subSelect = document.getElementById('subCat');

    mainSelect.onchange = async () => {
        const val = mainSelect.value;
        subSelect.innerHTML = "<option>Жүктелуде...</option>";
        if(!val) return subSelect.innerHTML = "";

        try {
            const doc = await db.collection("categories").doc(val).get();
            if(doc.exists) {
                const list = doc.data().list || [];
                subSelect.innerHTML = "";
                list.forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item; opt.innerText = item;
                    subSelect.appendChild(opt);
                });
            } else {
                subSelect.innerHTML = "<option>Тізім бос</option>";
            }
        } catch(e) { console.error(e); }
    };

    // 2. СУРЕТТІ КӨРУ
    document.getElementById('imgInp').onchange = (e) => {
        const [file] = e.target.files;
        if(file) {
            document.getElementById('preview').src = URL.createObjectURL(file);
            document.getElementById('preview').style.display = 'block';
        }
    };

    // 3. СУРЕТТІ СЫҒУ (САПАНЫ САҚТАП, САЛМАҚТЫ АЗАЙТУ)
    async function compressImg(file) {
        return new Promise((res) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (ev) => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 1280; 
                    let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX / w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    canvas.toBlob((blob) => res(blob), 'image/jpeg', 0.8);
                };
            };
        });
    }

    // 4. ЖІБЕРУ
    document.getElementById('sendBtn').onclick = async function() {
        const file = document.getElementById('imgInp').files[0];
        const title = document.getElementById('title').value;
        if(!file || !title) return alert("Сурет пен атау міндетті!");

        const btn = this;
        const status = document.getElementById('status');
        btn.disabled = true;
        status.innerText = "Сурет оңтайландырылуда...";

        try {
            const finalFile = await compressImg(file);
            status.innerText = "Базаға жіберілуде...";
            
            const ref = storage.ref('ads/' + Date.now() + ".jpg");
            const upload = ref.put(finalFile);

            upload.on('state_changed', (snap) => {
                const prg = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
                btn.innerText = "Жүктелуде: " + prg + "%";
            });

            await upload;
            const url = await ref.getDownloadURL();

            await db.collection("ads").add({
                mainCat: mainSelect.value,
                subCat: subSelect.value,
                title: title,
                price: Number(document.getElementById('price').value),
                phone: document.getElementById('phone').value,
                desc: document.getElementById('desc').value,
                img: url,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("СӘТТІ ЖАРЫЯЛАНДЫ! ✅");
            window.location.href = "index.html";
        } catch(e) { alert("Қате: " + e.message); btn.disabled = false; }
    };
</script>
</body>
</html>
