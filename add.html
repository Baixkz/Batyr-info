<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Қосу - Batyrsity</title>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .form-card { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; font-size: 14px; font-weight: 600; color: #666; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; background: #fafafa; }
        .upload-area { border: 2px dashed #ddd; padding: 20px; text-align: center; border-radius: 15px; margin-top: 15px; cursor: pointer; }
        #preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 30px; transition: 0.3s; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Жаңа хабарландыру</h2>
    
    <label>Бөлімді таңдаңыз:</label>
    <select id="mainCat" onchange="updateSubCat()">
        <option value="">-- Таңдау --</option>
        <option value="market">🛒 Маркет (Сату-алу)</option>
        <option value="jobs">💼 Жұмыс</option>
        <option value="services">🛠 Қызмет көрсету</option>
    </select>

    <label>Категория:</label>
    <select id="subCat">
        <option value="">-- Алдымен бөлімді таңдаңыз --</option>
    </select>

    <label>Атауы:</label>
    <input type="text" id="title" placeholder="Не сатасыз?">

    <label>Бағасы:</label>
    <input type="number" id="price" placeholder="Теңгемен">

    <label>Сипаттама (міндетті емес):</label>
    <textarea id="desc" rows="3"></textarea>

    <label>Телефон:</label>
    <input type="text" id="phone" placeholder="87071234567">

    <div class="upload-area" onclick="document.getElementById('imgInp').click()">
        <span>📸 Сурет жүктеу</span>
        <input type="file" id="imgInp" accept="image/*" hidden>
        <img id="preview">
    </div>

    <button id="sendBtn">Жариялау</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaIwrxsSc4s4SV_sIfOwcGaeB6obdpuzE",
        authDomain: "batyr-final.firebaseapp.com",
        projectId: "batyr-final",
        storageBucket: "batyr-final.appspot.com",
        messagingSenderId: "621519255228",
        appId: "1:621519255228:web:6087e026a6db84afa2c2b9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // Категориялар базасы (Осы жерге жаңасын қоса бересің)
    const categories = {
        market: ["Мал базар", "Көлік сату", "Жер және Үй", "Құрылыс заттары", "Тұрмыстық заттар", "Киім", "Ет"],
        jobs: ["Жұмыс іздеймін", "Бос жұмыс орны"],
        services: ["Такси", "Жөндеу", "Тамақтану", "Медицина"]
    };

    function updateSubCat() {
        const main = document.getElementById('mainCat').value;
        const sub = document.getElementById('subCat');
        sub.innerHTML = "";
        if(main && categories[main]) {
            categories[main].forEach(c => {
                let opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                sub.appendChild(opt);
            });
        }
    }

    document.getElementById('imgInp').onchange = function(e) {
        const [file] = this.files;
        if (file) {
            document.getElementById('preview').src = URL.createObjectURL(file);
            document.getElementById('preview').style.display = 'block';
        }
    };

    document.getElementById('sendBtn').onclick = async function() {
        const btn = this;
        const file = document.getElementById('imgInp').files[0];
        const data = {
            mainCat: document.getElementById('mainCat').value,
            subCat: document.getElementById('subCat').value,
            title: document.getElementById('title').value,
            price: Number(document.getElementById('price').value),
            phone: document.getElementById('phone').value,
            desc: document.getElementById('desc').value,
            status: "active",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!data.mainCat || !data.title || !file) return alert("Маңызды жерлерді толтыр!");

        btn.disabled = true; btn.innerText = "Жүктелуде...";

        try {
            const ref = storage.ref('ads/' + Date.now() + "_" + file.name);
            await ref.put(file);
            data.img = await ref.getDownloadURL();
            await db.collection("ads").add(data);
            alert("Сәтті қосылды!");
            window.location.href = "index.html";
        } catch (e) { alert("Қате: " + e.message); btn.disabled = false; }
    };
</script>
</body>
</html>
