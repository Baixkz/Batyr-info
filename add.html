<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жарнама қосу - Batyr Info</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #333; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; color: #007bff; }
        label { font-size: 14px; font-weight: bold; margin-top: 10px; display: block; }
        input, select, textarea, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; outline: none; }
        .upload-area { border: 3px dashed #007bff; background: #f8fbff; padding: 20px; text-align: center; margin-top: 20px; cursor: pointer; color: #007bff; font-weight: bold; border-radius: 15px; }
        #previewContainer { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; justify-content: center; }
        #previewContainer img { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; border: 2px solid #007bff; }
        #sendBtn { background: #007bff; color: white; border: none; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; height: 55px; }
        #sendBtn:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h2>Жаңа жарнама</h2>
    
    <label>Категория таңдаңыз:</label>
    <select id="categorySelect">
        <option value="">Жүктелуде...</option>
    </select>

    <label>Атауы:</label>
    <input type="text" id="title" placeholder="Не сатасыз немесе ұсынасыз?">
    
    <label>Бағасы (₸):</label>
    <input type="number" id="price" placeholder="Мысалы: 5000">
    
    <label>Телефон нөмірі:</label>
    <input type="tel" id="phone" placeholder="87071234567">
    
    <label>Толық сипаттама:</label>
    <textarea id="desc" placeholder="Толығырақ жазыңыз..." rows="3"></textarea>

    <div class="upload-area" onclick="document.getElementById('imgInp').click()">
        📸 СУРЕТ ТАҢДАУ (Макс: 3)
        <input type="file" id="imgInp" accept="image/*" multiple hidden>
    </div>
    <div id="previewContainer"></div>

    <button id="sendBtn">ЖАРИЯЛАУ</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaIwrxsSc4s4SV_sIfOwcGaeB6obdpuzE",
        authDomain: "batyr-final.firebaseapp.com",
        projectId: "batyr-final",
        storageBucket: "batyr-final.appspot.com",
        messagingSenderId: "621519255228",
        appId: "1:621519255228:web:6087e026a6db84afa2c2b9"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/drfeyzyzb/image/upload";
    const CLOUDINARY_PRESET = "ml_default";

    let selectedFiles = [];

    // --- 1. КАТЕГОРИЯЛАРДЫ АВТОМАТТЫ ТҮРДЕ АЛУ ---
    function loadCategories() {
        const select = document.getElementById('categorySelect');
        db.collection("categories").orderBy("name", "asc").onSnapshot(snap => {
            select.innerHTML = '<option value="">-- Категория таңдаңыз --</option>';
            snap.forEach(doc => {
                const cat = doc.data().name;
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        });
    }
    loadCategories();

    // Суретті алдын ала көру
    document.getElementById('imgInp').onchange = (e) => {
        selectedFiles = Array.from(e.target.files).slice(0, 3);
        const container = document.getElementById('previewContainer');
        container.innerHTML = "";
        selectedFiles.forEach(file => {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            container.appendChild(img);
        });
    };

    // --- 2. ЖАРНАМА ЖІБЕРУ ---
    document.getElementById('sendBtn').onclick = async function() {
        const category = document.getElementById('categorySelect').value;
        const title = document.getElementById('title').value;
        const price = document.getElementById('price').value;
        const phone = document.getElementById('phone').value;
        const desc = document.getElementById('desc').value;

        if(!category) return alert("Категорияны таңдаңыз!");
        if(!title || selectedFiles.length === 0) return alert("Атауы мен кемінде 1 сурет қажет!");

        const btn = this;
        btn.disabled = true;
        let urls = [];

        try {
            // Cloudinary-ге жүктеу
            for (let i = 0; i < selectedFiles.length; i++) {
                btn.innerText = `Сурет жүктелуде ${i+1}/${selectedFiles.length}...`;
                const formData = new FormData();
                formData.append('file', selectedFiles[i]);
                formData.append('upload_preset', CLOUDINARY_PRESET);

                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.secure_url) urls.push(data.secure_url);
            }

            // Firestore-ға сақтау
            await db.collection("ads").add({
                category: category,
                title: title,
                price: Number(price),
                phone: phone,
                desc: desc,
                images: urls,
                status: "pending", // Жарнама админ тексеруіне (Күтуде) түседі
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Жарнама жіберілді! Админ тексерген соң шығады. ✅");
            window.location.reload();
        } catch (e) {
            alert("Қате шықты: " + e.message);
            btn.disabled = false;
            btn.innerText = "ҚАЙТА КӨРУ";
        }
    };
</script>
</body>
</html>
