<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хабарландыру қосу - Batyr Info</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Жаңа хабарландыру</h2>
    <input type="text" id="title" placeholder="Атауы">
    <input type="number" id="price" placeholder="Бағасы">
    <textarea id="description" placeholder="Сипаттамасы"></textarea>
    <input type="text" id="phone" placeholder="Телефон (мыс: 8707...)">
    <button id="submitBtn">Жариялауға жіберу</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Сенің конфигің
    const firebaseConfig = {
        apiKey: "AIzaSyCaIwrxsSc4s4SV_sIfOwcGaeB6obdpuzE",
        authDomain: "batyr-final.firebaseapp.com",
        projectId: "batyr-final",
        storageBucket: "batyr-final.firebasestorage.app",
        messagingSenderId: "621519255228",
        appId: "1:621519255228:web:6087e026a6db84afa2c2b9"
    };

    // Іске қосу
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('submitBtn').onclick = function() {
        const title = document.getElementById('title').value;
        const price = document.getElementById('price').value;
        const phone = document.getElementById('phone').value;
        const desc = document.getElementById('description').value;

        if(!title || !price || !phone) {
            alert("Бос орындарды толтырыңыз!");
            return;
        }

        // Батырманы уақытша өшіру (екі рет басылып кетпеу үшін)
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = "Жіберілуде...";

        db.collection("ads").add({
            title: title,
            price: Number(price),
            phone: phone,
            description: desc,
            status: "pending",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            alert("СӘТТІ ЖІБЕРІЛДІ!");
            window.location.href = "index.html";
        })
        .catch((error) => {
            alert("ҚАТЕ ШЫҚТЫ: " + error.message);
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').innerText = "Қайта көру";
        });
    };
</script>

</body>
</html>
