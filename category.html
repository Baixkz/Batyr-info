<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATYR INFO - Тізім</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --main-blue: #007aff; --bg-color: #f2f4f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 20px; }
        
        .header { 
            background: var(--main-blue); color: white; padding: 15px 20px; 
            display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100;
        }
        .header a { color: white; text-decoration: none; font-size: 20px; }
        .header h2 { margin: 0; font-size: 18px; text-transform: capitalize; }

        .container { padding: 15px; }

        /* Ішкі категориялар стилі (Sub-categories) */
        .sub-cat-item {
            background: white; padding: 18px; border-radius: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 600; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            cursor: pointer; transition: 0.2s;
        }
        .sub-cat-item:active { transform: scale(0.98); background: #f9f9f9; }

        /* Жарнама карточкасы */
        .ad-item { 
            background: white; padding: 12px; border-radius: 18px; 
            margin-bottom: 12px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .ad-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; background: #eee; }
        .ad-info { flex: 1; }
        .ad-info h4 { margin: 0 0 4px 0; font-size: 15px; color: #1a1a1a; }
        .ad-info p { margin: 0; font-size: 12px; color: #777; line-height: 1.4; }
        .ad-price { color: var(--main-blue); font-weight: 800; font-size: 14px; margin-top: 4px; display: block; }

        .call-btn { 
            background: #25D366; color: white; width: 40px; height: 40px; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 18px;
        }
        .empty-msg { text-align: center; color: #999; margin-top: 50px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i></a>
        <h2 id="catTitle">Жүктелуде...</h2>
    </div>

    <div class="container">
        <div id="listContainer">
            </div>
    </div>

    <script src="app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const catId = params.get('id'); // Категория ID-і
        const catName = params.get('name') || 'Бөлім';
        
        document.getElementById('catTitle').innerText = decodeURIComponent(catName);

        function renderPage() {
            const container = document.getElementById('listContainer');
            container.innerHTML = "";

            // 1. Алдымен осы категорияға тиесілі ІШКІ КАТЕГОРИЯЛАРДЫ іздейміз
            db.collection("categories")
              .where("parentId", "==", catId)
              .onSnapshot(snap => {
                if (!snap.empty) {
                    container.innerHTML = ""; // Категориялар бар болса тазалаймыз
                    snap.forEach(doc => {
                        const sub = doc.data();
                        container.innerHTML += `
                            <div class="sub-cat-item" onclick="location.href='category.html?id=${doc.id}&name=${encodeURIComponent(sub.name)}'">
                                <span>${sub.name}</span>
                                <i class="fas fa-chevron-right" style="color:#ccc; font-size:12px"></i>
                            </div>`;
                    });
                } else {
                    // 2. Ішкі категория жоқ болса, ДЕМЕК ЖАРНАМАЛАРДЫ шығарамыз
                    loadAds();
                }
            });
        }

        function loadAds() {
            const container = document.getElementById('listContainer');
            db.collection("ads")
              .where("category", "==", catId)
              .where("status", "==", "active")
              .onSnapshot(snap => {
                container.innerHTML = "";
                if(snap.empty) {
                    container.innerHTML = '<p class="empty-msg">Бұл бөлімде әзірге ештеңе жоқ.</p>';
                    return;
                }
                snap.forEach(doc => {
                    const ad = doc.data();
                    const photo = ad.images && ad.images.length > 0 ? ad.images[0] : 'https://via.placeholder.com/100?text=No+Photo';
                    
                    container.innerHTML += `
                        <div class="ad-item">
                            <img src="${photo}" class="ad-img" onerror="this.src='https://via.placeholder.com/100?text=Error'">
                            <div class="ad-info">
                                <h4>${ad.title}</h4>
                                <p>${ad.desc ? ad.desc.substring(0, 50) + '...' : 'Сипаттама жоқ'}</p>
                                <span class="ad-price">${ad.price ? ad.price + ' ₸' : 'Келісімді'}</span>
                            </div>
                            <a href="tel:${ad.phone}" class="call-btn"><i class="fas fa-phone"></i></a>
                        </div>`;
                });
            });
        }

        if(catId) { renderPage(); } else { location.href = 'index.html'; }
    </script>
</body>
</html>
