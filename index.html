
<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATYR INFO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header style="background: #007bff; color: white; text-align: center; padding: 15px; position: relative;">
    <div style="position: absolute; right: 10px; top: 15px;">
        <button onclick="changeLang('kk')" style="background: none; border: 1px solid white; color: white; cursor: pointer; padding: 3px 7px; border-radius: 5px; font-weight: bold;">KZ</button>
        <button onclick="changeLang('ru')" style="background: none; border: 1px solid white; color: white; cursor: pointer; padding: 3px 7px; border-radius: 5px; font-weight: bold;">RU</button>
    </div>
    <h1 style="margin-top: 10px; font-size: 24px;">BATYR INFO</h1>
    <p id="sub-title" style="font-size: 14px; opacity: 0.9;">Ақтау қаласының анықтамалығы</p>
</header>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; background: #f8f9fa;">
    
    <a href="shops.html" class="main-card">
        <i class="fas fa-shopping-cart"></i>
        <span id="btn-shops">Дүкендер</span>
    </a>

    <a href="#" class="main-card">
        <i class="fas fa-utensils"></i>
        <span id="btn-food">Тамақтану</span>
    </a>

    <a href="#" class="main-card">
        <i class="fas fa-first-aid"></i>
        <span id="btn-health">Медицина</span>
    </a>

    <a href="#" class="main-card">
        <i class="fas fa-briefcase"></i>
        <span id="btn-work">Жұмыс</span>
    </a>

    <a href="#" class="main-card">
        <i class="fas fa-car-side"></i>
        <span id="btn-auto">Автоқызмет</span>
    </a>

    <a href="#" class="main-card">
        <i class="fas fa-magic"></i>
        <span id="btn-beauty">Сұлулық</span>
    </a>
</div>

<style>
    .main-card {
        background: white;
        padding: 20px 10px;
        border-radius: 15px;
        text-align: center;
        text-decoration: none;
        color: #333;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: 0.3s;
    }
    .main-card i {
        font-size: 26px;
        color: #007bff;
        margin-bottom: 10px;
    }
    .main-card span {
        font-weight: bold;
        font-size: 14px;
    }
    .main-card:active { transform: scale(0.95); }
</style>

<script>
    const langData = {
        'kk': {
            'sub-title': 'Ақтау қаласының анықтамалығы',
            'btn-shops': 'Дүкендер',
            'btn-food': 'Тамақтану',
            'btn-health': 'Медицина',
            'btn-work': 'Жұмыс',
            'btn-auto': 'Автоқызмет',
            'btn-beauty': 'Сұлулық'
        },
        'ru': {
            'sub-title': 'Справочник города Актау',
            'btn-shops': 'Магазины',
            'btn-food': 'Питание',
            'btn-health': 'Медицина',
            'btn-work': 'Работа',
            'btn-auto': 'Автосервис',
            'btn-beauty': 'Красота'
        }
    };

    function changeLang(lang) {
        localStorage.setItem('selectedLang', lang);
        for (let key in langData[lang]) {
            const el = document.getElementById(key);
            if (el) el.innerText = langData[lang][key];
        }
    }

    window.onload = () => {
        const savedLang = localStorage.getItem('selectedLang') || 'kk';
        changeLang(savedLang);
    };
</script>

</body>
</html>
