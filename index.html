<!DOCTYPE html>
<html lang="kk" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>BATYR INFO</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #007aff; --bg-color: #f2f4f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding: 0; padding-bottom: 70px; -webkit-tap-highlight-color: transparent; }
        
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }

        /* Header */
        .header-section { background: #007aff; padding: 15px 20px 35px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .location-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .header-title { font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 15px; letter-spacing: 1px; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 18px 5px; border-radius: 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 95px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: 0.2s; }
        .card i { font-size: 26px; color: var(--main-blue); margin-bottom: 8px; }
        .card span { font-size: 10.5px; font-weight: 700; color: #1a1a1a; text-align: center; line-height: 1.2; }

        /* Төменгі бөлім (Орнату + Шарттар) */
        .footer-area { padding: 20px 15px 30px; text-align: center; }
        #installContainer { display: none; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #installBtn { background: #007aff; color: white; border: none; padding: 14px; border-radius: 15px; font-weight: 800; width: 100%; font-size: 14px; cursor: pointer; }
        .footer-link { color: var(--main-blue); text-decoration: none; font-weight: 700; font-size: 13px; display: block; margin-bottom: 10px; }
        .copy { color: #000; font-size: 14px; font-weight: 900; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #8e8e93; font-size: 11px; font-weight: 700; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--main-blue); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        /* Локация парағы */
        #locationSheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-radius: 25px 25px 0 0; transition: 0.4s; z-index: 2000; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        #locationSheet.active { bottom: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1999; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="header-section">
            <div class="top-bar">
                <button class="location-btn" onclick="toggleSheet(true)">
                    <i class="fas fa-map-marker-alt"></i> <span id="currentLocText">Батыр ауылы</span> <i class="fas fa-chevron-down"></i>
                </button>
                <div style="font-weight: 800; font-size: 12px;">KZ</div>
            </div>
            <div class="header-title">BATYR INFO</div>
        </div>

        <div class="grid">
            <a href="olx.html" class="card"><i class="fas fa-bullhorn"></i><span>Хабарландыру</span></a>
            <a href="shops.html" class="card"><i class="fas fa-shopping-bag"></i><span>Дүкендер</span></a>
            <a href="jobs.html" class="card"><i class="fas fa-briefcase"></i><span>Жұмыс</span></a>
            <a href="trans.html" class="card"><i class="fas fa-taxi"></i><span>Такси</span></a>
            <a href="food.html" class="card"><i class="fas fa-utensils"></i><span>Тамақтану</span></a>
            <a href="bath.html" class="card"><i class="fas fa-tools"></i><span>Қызметтер</span></a>
        </div>

        <div class="footer-area">
            <div id="installContainer">
                <p style="margin-bottom: 12px; font-weight: 700; font-size: 13px; color: #555;">Қолданбаны орнатып, жылдам кіріңіз</p>
                <button id="installBtn"><i class="fas fa-download"></i> ОРНАТУ</button>
            </div>
            
            <a href="rules.html" class="footer-link">Пайдалану шарттары</a>
            <div class="copy">2026 BAIX</div>
        </div>
    </div>

    <div id="page-market" class="page">
        <div class="header-section" style="padding-bottom: 20px;">
            <div class="header-title">МАРКЕТ</div>
        </div>
        <div style="padding: 40px; text-align: center; color: #8e8e93;">
            <i class="fas fa-store" style="font-size: 40px; margin-bottom: 10px;"></i>
            <p>Бұл бөлім жақын арада толығады...</p>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="header-section" style="padding-bottom: 20px;">
            <div class="header-title">ПРОФИЛЬ</div>
        </div>
        <div style="padding: 40px; text-align: center; color: #8e8e93;">
            <i class="fas fa-user-circle" style="font-size: 40px; margin-bottom: 10px;"></i>
            <p>Жеке кабинет жоспарда бар...</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="showPage('home')"><i class="fas fa-home"></i><span>Басты</span></div>
        <div class="nav-item" id="nav-market" onclick="showPage('market')"><i class="fas fa-store"></i><span>Маркет</span></div>
        <div class="nav-item" id="nav-profile" onclick="showPage('profile')"><i class="fas fa-user"></i><span>Профиль</span></div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSheet(false)"></div>
    <div id="locationSheet" style="padding: 20px;">
        <h3 style="color:#007aff">Локация таңдаңыз</h3>
        <div style="padding: 15px 0; border-bottom: 1px solid #eee;" onclick="selectLoc('Батыр ауылы')">Батыр ауылы</div>
        <div style="padding: 15px 0;" onclick="selectLoc('Ақтау қаласы')">Ақтау қаласы</div>
    </div>

    <script>
        // Беттерді ауыстыру
        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-'+p).classList.add('active');
            window.scrollTo(0,0);
        }

        // PWA Орнату логикасы (Samsung + Chrome)
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Батырманы тек Басты бетте көрсетеміз
            document.getElementById('installContainer').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('installContainer').style.display = 'none';
                deferredPrompt = null;
            } else {
                alert("Орнату үшін браузер менюінен 'Добавить на главный экран' таңдаңыз.");
            }
        });

        function toggleSheet(s) {
            document.getElementById('locationSheet').classList.toggle('active', s);
            document.getElementById('overlay').style.display = s ? 'block' : 'none';
        }

        function selectLoc(c) {
            document.getElementById('currentLocText').innerText = c;
            toggleSheet(false);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
