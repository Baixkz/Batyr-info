<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>BATYR INFO</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Стили толығымен сенің бірінші кодыңнан алынды */
        :root { --main-blue: #007aff; --bg-color: #f2f4f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 70px; -webkit-tap-highlight-color: transparent; }
        .page { display: none; }
        .page.active { display: block; }
        .header-section { background: #007aff; padding: 15px 20px 35px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .location-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .lang-switcher { display: flex; gap: 5px; }
        .lang-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .lang-btn.active { background: white !important; color: #007aff !important; }
        .header-title { font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 15px; letter-spacing: 1px; }
        .live-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .live-item { background: rgba(255,255,255,0.15); padding: 5px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; min-width: 80px; justify-content: center; }
        .search-box { background: white; border-radius: 15px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .search-box input { border: none; outline: none; width: 100%; font-size: 14px; color: #333; }
        .add-ad-btn { background: #007aff; color: white; margin: 15px 20px 0; padding: 12px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-weight: 800; font-size: 14px; box-shadow: 0 4px 12px rgba(0,122,255,0.2); transition: 0.2s; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 5px 15px 25px; max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 18px 5px; border-radius: 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: 0.2s; height: 100px; justify-content: center; box-sizing: border-box; }
        .card i { font-size: 28px; color: var(--main-blue); margin-bottom: 8px; height: 32px; display: flex; align-items: center; }
        .card span { font-size: 10.5px; font-weight: 700; color: #1a1a1a; text-align: center; line-height: 1.2; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #8e8e93; font-size: 11px; font-weight: 700; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--main-blue); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1999; }
        #locationSheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-top-left-radius: 25px; border-top-right-radius: 25px; transition: 0.4s; z-index: 2000; padding: 20px; box-sizing: border-box; }
        #locationSheet.active { bottom: 0; }
        .loc-item { padding: 15px; border-bottom: 1px solid #eee; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="header-section">
            <div class="top-bar">
                <button class="location-btn" onclick="window.toggleSheet(true)">
                    <i class="fas fa-map-marker-alt"></i> <span id="currentLocText">Батыр ауылы</span> <i class="fas fa-chevron-down"></i>
                </button>
                <div class="lang-switcher">
                    <button class="lang-btn active" id="btnKZ" onclick="window.changeLang('kk')">KZ</button>
                    <button class="lang-btn" id="btnRU" onclick="window.changeLang('ru')">RU</button>
                </div>
            </div>
            <div class="header-title">BATYR INFO</div>
            <div class="live-bar">
                <div class="live-item" id="prayerText"><i class="fas fa-mosque"></i> ...</div>
                <div class="live-item" id="weatherText"><i class="fas fa-temperature-high"></i> ...°C</div>
            </div>
            <div class="search-box">
                <i class="fas fa-search" style="color:#888"></i>
                <input type="text" id="searchInput" onkeyup="window.searchCards()" placeholder="Іздеу...">
            </div>
        </div>

        <a href="add.html" class="add-ad-btn">
            <i class="fas fa-plus-circle"></i> <span data-key="addBtnText">Жарнама қосу</span>
        </a>

        <div class="grid" id="mainGrid">
            <a href="shops.html" class="card"><i class="fas fa-shopping-bag"></i><span data-key="shops">Дүкендер</span></a>
            <a href="jobs.html" class="card"><i class="fas fa-briefcase"></i><span data-key="jobs">Жұмыс</span></a>
            <a href="trans.html" class="card"><i class="fas fa-taxi"></i><span data-key="trans">Көлік және Такси</span></a>
            <a href="food.html" class="card"><i class="fas fa-utensils"></i><span data-key="food">Тамақтану</span></a>
            <a href="bath.html" class="card"><i class="fas fa-th-large"></i><span data-key="services">Қызмет көрсету</span></a>
            <a href="med.html" class="card"><i class="fas fa-hospital"></i><span data-key="med">Медицина</span></a>
            <a href="edu.html" class="card"><i class="fas fa-landmark"></i><span data-key="org">Мекемелер</span></a>
            <a href="fun.html" class="card"><i class="fas fa-gamepad"></i><span data-key="fun">Ойын-сауық</span></a>
        </div>

        <footer>
            <a href="rules.html" style="color: #007aff; text-decoration: none; font-weight: 700; display: block; text-align: center; margin: 20px 0;">Пайдалану шарттары</a>
            <div style="text-align: center; font-weight: 800;">2026 BAIX</div>
        </footer>
    </div>

    <div id="page-market" class="page">
        <div class="header-section"><div class="header-title">МАРКЕТ</div></div>
        <div style="padding: 20px; text-align: center;">Маркет бөлімі дайындалуда...</div>
    </div>

    <div id="page-profile" class="page">
        <div class="header-section"><div class="header-title">ПРОФИЛЬ</div></div>
        <div style="padding: 20px; text-align: center;">Кіру жүйесі жақын арада...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="window.showPage('home')">
            <i class="fas fa-home"></i><span data-key="navHome">Басты</span>
        </div>
        <div class="nav-item" id="nav-market" onclick="window.showPage('market')">
            <i class="fas fa-store"></i><span data-key="navMarket">Маркет</span>
        </div>
        <div class="nav-item" id="nav-profile" onclick="window.showPage('profile')">
            <i class="fas fa-user"></i><span data-key="navProfile">Профиль</span>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="window.toggleSheet(false)"></div>
    <div id="locationSheet">
        <div style="font-weight: 900; margin-bottom: 15px;">Локация таңдаңыз</div>
        <div class="loc-item" onclick="window.selectLoc('Батыр ауылы')">Батыр ауылы</div>
        <div class="loc-item" onclick="window.selectLoc('Ақтау қаласы')">Ақтау қаласы</div>
    </div>

    <script type="module">
        import { db } from "./firebase.js"; // Firebase-ті қосамыз

        const translations = {
            kk: { 
                navHome: "Басты", navMarket: "Маркет", navProfile: "Профиль", addBtnText: "Жарнама қосу", 
                shops: "Дүкендер", jobs: "Жұмыс", trans: "Көлік және Такси", food: "Тамақтану", 
                services: "Қызмет көрсету", med: "Медицина", org: "Мекемелер", fun: "Ойын-сауық",
                prayerNames: { Fajr: "Таң", Dhuhr: "Бесін", Asr: "Екінді", Maghrib: "Ақшам", Isha: "Құптан" } 
            },
            ru: { 
                navHome: "Главная", navMarket: "Маркет", navProfile: "Профиль", addBtnText: "Подать объявление",
                shops: "Магазины", jobs: "Работа", trans: "Транспорт", food: "Питание", 
                services: "Услуги", med: "Медицина", org: "Учреждения", fun: "Развлечения",
                prayerNames: { Fajr: "Фаджр", Dhuhr: "Зухр", Asr: "Аср", Maghrib: "Магриб", Isha: "Иша" } 
            }
        };

        window.currentLang = 'kk';

        // 1. Тіл ауыстыру
        window.changeLang = (lang) => {
            window.currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(lang === 'kk' ? 'btnKZ' : 'btnRU').classList.add('active');
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });
            updatePrayerTimes();
        };

        // 2. Беттерді ауыстыру
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        };

        // 3. Локация
        window.toggleSheet = (show) => {
            document.getElementById('locationSheet').classList.toggle('active', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        };
        window.selectLoc = (city) => {
            document.getElementById('currentLocText').innerText = city;
            window.toggleSheet(false);
        };

        // 4. Іздеу
        window.searchCards = () => {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "" : "none";
            }
        };

        // 5. Ауа райы және Намаз (API)
        async function updateWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=43.65&longitude=51.17&current_weather=true');
                const data = await res.json();
                document.getElementById('weatherText').innerHTML = `<i class="fas fa-temperature-high"></i> ${Math.round(data.current_weather.temperature)}°C`;
            } catch (e) { console.error(e); }
        }

        async function updatePrayerTimes() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Aktau&country=Kazakhstan&method=2');
                const data = await res.json();
                const t = data.data.timings;
                // Келесі намазды анықтау логикасын осында қосуға болады, қазірше "Бесін" үлгі ретінде:
                document.getElementById('prayerText').innerHTML = `<i class="fas fa-mosque"></i> ${translations[window.currentLang].prayerNames.Dhuhr}: ${t.Dhuhr}`;
            } catch (e) { console.error(e); }
        }

        // Іске қосу
        window.onload = () => {
            updateWeather();
            updatePrayerTimes();
        };
    </script>
</body>
</html>
