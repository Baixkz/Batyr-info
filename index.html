<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATYR INFO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #007aff; --bg-color: #f2f4f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 70px; }
        
        .page { display: none; }
        .page.active { display: block; }

        .header-section { background: #007aff; padding: 15px 20px 35px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .location-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .header-title { font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 15px; letter-spacing: 1px; }
        .live-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .live-item { background: rgba(255,255,255,0.15); padding: 5px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; }

        .search-box { background: white; border-radius: 15px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .search-box input { border: none; outline: none; width: 100%; font-size: 14px; }

        /* Тұрақты Grid (Скриншоттағыдай) */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 20px 15px; }
        .card { background: white; padding: 18px 5px; border-radius: 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); height: 100px; box-sizing: border-box; }
        .card i { font-size: 28px; color: var(--main-blue); margin-bottom: 8px; }
        .card span { font-size: 10.5px; font-weight: 700; color: #1a1a1a; text-align: center; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #8e8e93; font-size: 11px; font-weight: 700; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--main-blue); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="header-section">
            <div class="top-bar">
                <button class="location-btn">
                    <i class="fas fa-map-marker-alt"></i> <span>Батыр ауылы</span>
                </button>
                <div style="font-weight: 800;">KZ</div>
            </div>
            <div class="header-title">BATYR INFO</div>
            <div class="live-bar">
                <div class="live-item" id="prayerText"><i class="fas fa-mosque"></i> ...</div>
                <div class="live-item" id="weatherText"><i class="fas fa-temperature-high"></i> ...°C</div>
            </div>
            <div class="search-box">
                <i class="fas fa-search" style="color:#888"></i>
                <input type="text" placeholder="Іздеу...">
            </div>
        </div>

        <div class="grid">
            <a href="shops.html" class="card"><i class="fas fa-shopping-bag"></i><span>Дүкендер</span></a>
            <a href="jobs.html" class="card"><i class="fas fa-briefcase"></i><span>Жұмыс</span></a>
            <a href="trans.html" class="card"><i class="fas fa-taxi"></i><span>Такси</span></a>
            <a href="food.html" class="card"><i class="fas fa-utensils"></i><span>Тамақтану</span></a>
            <a href="bath.html" class="card"><i class="fas fa-th-large"></i><span>Қызмет көрсету</span></a>
            <a href="med.html" class="card"><i class="fas fa-hospital"></i><span>Медицина</span></a>
            <a href="edu.html" class="card"><i class="fas fa-landmark"></i><span>Мекемелер</span></a>
            <a href="fun.html" class="card"><i class="fas fa-gamepad"></i><span>Ойын-сауық</span></a>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i><span>Басты</span></div>
        <div class="nav-item" onclick="showPage('market')"><i class="fas fa-store"></i><span>Маркет</span></div>
        <div class="nav-item" onclick="showPage('profile')"><i class="fas fa-user"></i><span>Профиль</span></div>
    </div>

    <script>
        // Firebase баптаулары (Сенің деректерің)
        const firebaseConfig = {
            apiKey: "AIzaSyCaIwrxsSc4s4SV_sIfOwcGaeB6obdpuzE",
            authDomain: "batyr-final.firebaseapp.com",
            projectId: "batyr-final",
            storageBucket: "batyr-final.appspot.com",
            messagingSenderId: "621519255228",
            appId: "1:621519255228:web:6087e026a6db84afa2c2b9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Егер Маркет беті болса, сол жаққа бағыттау немесе контентті ауыстыру
            console.log("Бет ауысты:", pageId);
        }

        async function getInfo() {
            try {
                const w = await fetch('https://api.open-meteo.com/v1/forecast?latitude=43.65&longitude=51.17&current_weather=true').then(r => r.json());
                document.getElementById('weatherText').innerHTML = `<i class="fas fa-temperature-high"></i> ${Math.round(w.current_weather.temperature)}°C`;
                
                const p = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Aktau&country=Kazakhstan&method=2').then(r => r.json());
                document.getElementById('prayerText').innerHTML = `<i class="fas fa-mosque"></i> Таң: ${p.data.timings.Fajr}`;
            } catch (e) { console.log("Дерек қатесі"); }
        }

        window.onload = getInfo;
    </script>
</body>
</html>
