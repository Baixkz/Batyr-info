<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATYR INFO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #007aff; --bg-color: #f2f4f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 0; overflow-x: hidden; }

        /* HEADER */
        .header-section {
            background: #007aff; padding: 15px 20px 55px;
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; color: white;
            position: relative;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .location-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .lang-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .lang-btn.active { background: white !important; color: #007aff !important; }
        .header-title { font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 20px; letter-spacing: 1px; }

        /* SEARCH */
        .search-box { background: white; border-radius: 18px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .search-box input { border: none; outline: none; width: 100%; font-size: 15px; color: #333; }

        /* MINI SLIDER (КОМПАКТТЫ ӨЛШЕМ) */
        .stories-container {
            padding: 10px 15px 0;
            margin-top: -35px;
            position: relative;
            z-index: 100;
        }
        
        .stories-wrapper {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 5px;
            scroll-behavior: smooth; /* Бірқалыпты жылжу */
        }
        .stories-wrapper::-webkit-scrollbar { display: none; }

        .story-item {
            min-width: 130px; /* Ені сәл үлкейтілді */
            height: 100px;   /* БИІКТІГІ АЗАЙТЫЛДЫ (100px) */
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            flex-shrink: 0;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px;
            text-decoration: none;
        }

        .story-item img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }

        .story-item span {
            position: relative; color: white;
            font-size: 10px; font-weight: 800;
            line-height: 1.2; z-index: 2;
        }

        /* GRID CATALOG */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 20px 10px; border-radius: 22px; text-decoration: none; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card i { font-size: 28px; color: var(--main-blue); margin-bottom: 10px; }
        .card span { font-size: 13px; font-weight: 800; color: #1a1a1a; }
        .badge-red { position: absolute; top: 10px; right: 10px; background: #ff3b30; color: white; font-size: 8px; padding: 3px 6px; border-radius: 8px; font-weight: 900; }

        footer { text-align: center; padding: 20px; }
        .footer-logo { font-size: 22px; font-weight: 900; color: #000; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="top-bar">
            <button class="location-btn"><i class="fas fa-map-marker-alt"></i> <span>Батыр ауылы</span></button>
            <div class="lang-switcher">
                <button class="lang-btn active">KZ</button>
                <button class="lang-btn">RU</button>
            </div>
        </div>
        <div class="header-title">BATYR INFO</div>
        <div class="search-box">
            <i class="fas fa-search" style="color:#888"></i>
            <input type="text" placeholder="Іздеу...">
        </div>
    </div>

    <div class="stories-container">
        <div class="stories-wrapper" id="storiesSlider">
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1557821552-17105176677c?q=80&w=300&h=200&fit=crop">
                <span>BATYR INFO-ға қосылыңыз</span>
            </a>
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=300&h=200&fit=crop">
                <span>Сіздің дүкеніңіз осында</span>
            </a>
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=300&h=200&fit=crop">
                <span>Дәмді тағамдар & жеткізу</span>
            </a>
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1549421263-5ec394a5ad4c?q=80&w=300&h=200&fit=crop">
                <span>Жедел такси қызметі</span>
            </a>
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1521791136364-798a7bc0d262?q=80&w=300&h=200&fit=crop">
                <span>Бос жұмыс орындары</span>
            </a>
        </div>
    </div>

    <div class="grid">
        <a href="ads.html" class="card"><span class="badge-red">NEW</span><i class="fas fa-bullhorn"></i><span>Хабарландыру</span></a>
        <a href="shops.html" class="card"><i class="fas fa-shopping-bag"></i><span>Дүкендер</span></a>
        <a href="med.html" class="card"><i class="fas fa-hospital"></i><span>Медицина</span></a>
        <a href="edu.html" class="card"><i class="fas fa-graduation-cap"></i><span>Білім</span></a>
        <a href="fun.html" class="card"><i class="fas fa-gamepad"></i><span>Ойын-сауық</span></a>
        <a href="food.html" class="card"><i class="fas fa-utensils"></i><span>Тамақтану</span></a>
        <a href="auto.html" class="card"><i class="fas fa-car-side"></i><span>Автоқызмет</span></a>
        <a href="jobs.html" class="card"><i class="fas fa-briefcase"></i><span>Жұмыс</span></a>
    </div>

    <footer>
        <a href="index.html" class="footer-logo">BAIX</a>
        <p style="color: #ccc; font-size: 10px;">© 2026 BATYR INFO</p>
    </footer>

    <script>
        // АВТОМАТТЫ СЛАЙДЕР ЛОГИКАСЫ
        const slider = document.getElementById('storiesSlider');
        let scrollAmount = 0;
        
        function autoScroll() {
            const maxScroll = slider.scrollWidth - slider.clientWidth;
            if (scrollAmount < maxScroll) {
                scrollAmount += 140; // Бір карточканың ені + gap
            } else {
                scrollAmount = 0; // Басына қайту
            }
            slider.scrollTo({
                left: scrollAmount,
                behavior: 'smooth'
            });
        }
        
        // 5 секунд сайын автоматты түрде жылжиды
        setInterval(autoScroll, 5000);
    </script>
</body>
</html>
