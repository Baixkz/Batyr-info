<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>BATYR INFO</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #007aff; --bg-color: #f2f4f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding: 0; padding-bottom: 70px; -webkit-tap-highlight-color: transparent; }
        
        .page { display: none; }
        .page.active { display: block; }

        /* Header */
        .header-section { background: #007aff; padding: 15px 20px 35px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .location-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .lang-switcher { display: flex; gap: 5px; }
        .lang-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .lang-btn.active { background: white !important; color: #007aff !important; }
        .header-title { font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 15px; }
        
        /* Search & Info */
        .live-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .live-item { background: rgba(255,255,255,0.15); padding: 5px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
        .search-box { background: white; border-radius: 15px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .search-box input { border: none; outline: none; width: 100%; font-size: 14px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 20px 15px; max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 18px 5px; border-radius: 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .card i { font-size: 28px; color: var(--main-blue); margin-bottom: 8px; }
        .card span { font-size: 10.5px; font-weight: 700; color: #1a1a1a; text-align: center; }

        /* Install Block (Басты бетке арналған) */
        #installContainer { display: none; padding: 0 20px; margin-bottom: 20px; }
        #installBtn { background: #007aff; color: white; border: none; padding: 15px; border-radius: 18px; font-weight: 800; width: 100%; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }

        /* Footer */
        footer { text-align: center; padding: 20px; margin-top: 10px; }
        .footer-link { color: var(--main-blue); text-decoration: none; font-weight: 700; font-size: 13px; display: block; margin-bottom: 10px; }
        .copy { color: #000; font-size: 14px; font-weight: 800; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #8e8e93; font-size: 11px; font-weight: 700; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--main-blue); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="header-section">
            <div class="top-bar">
                <button class="location-btn"><i class="fas fa-map-marker-alt"></i> Батыр ауылы</button>
                <div class="lang-switcher">
                    <button class="lang-btn active" onclick="changeLang('kk')">KZ</button>
                    <button class="lang-btn" onclick="changeLang('ru')">RU</button>
                </div>
            </div>
            <div class="header-title">BATYR INFO</div>
            <div class="live-bar">
                <div class="live-item" id="prayerText"><i class="fas fa-mosque"></i> ...</div>
                <div class="live-item" id="weatherText"><i class="fas fa-temperature-high"></i> ...°C</div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Іздеу...">
            </div>
        </div>

        <div class="grid">
            <a href="#" class="card"><i class="fas fa-bullhorn"></i><span data-key="ads">Хабарландыру</span></a>
            <a href="#" class="card"><i class="fas fa-shopping-bag"></i><span data-key="shops">Дүкендер</span></a>
            <a href="#" class="card"><i class="fas fa-briefcase"></i><span data-key="jobs">Жұмыс</span></a>
            <a href="#" class="card"><i class="fas fa-taxi"></i><span data-key="trans">Такси</span></a>
            <a href="#" class="card"><i class="fas fa-utensils"></i><span data-key="food">Тамақтану</span></a>
            <a href="#" class="card"><i class="fas fa-tools"></i><span data-key="services">Қызметтер</span></a>
        </div>

        <div id="installContainer">
            <button id="installBtn"><i class="fas fa-download"></i> Қолданбаны орнату</button>
        </div>

        <footer>
            <a href="rules.html" class="footer-link" data-key="oferta">Пайдалану шарттары</a>
            <div class="copy">2026 BAIX</div>
        </footer>
    </div>

    <div id="page-market" class="page">
        <div class="header-section" style="padding-bottom: 20px;"><div class="header-title">МАРКЕТ</div></div>
        <div style="padding: 40px; text-align: center; color: #888;">Жақында толығады...</div>
    </div>

    <div id="page-profile" class="page">
        <div class="header-section" style="padding-bottom: 20px;"><div class="header-title">ПРОФИЛЬ</div></div>
        <div style="padding: 40px; text-align: center;">
            <i class="fas fa-user-circle" style="font-size: 50px; color: #ccc; margin-bottom: 20px;"></i>
            <p>Жеке кабинет жоспарда бар...</p>
            
            <footer style="background: transparent; margin-top: 50px;">
                <a href="rules.html" class="footer-link" data-key="oferta">Пайдалану шарттары</a>
                <div class="copy">2026 BAIX</div>
            </footer>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="showPage('home')"><i class="fas fa-home"></i><span>Басты</span></div>
        <div class="nav-item" id="nav-market" onclick="showPage('market')"><i class="fas fa-store"></i><span>Маркет</span></div>
        <div class="nav-item" id="nav-profile" onclick="showPage('profile')"><i class="fas fa-user"></i><span>Профиль</span></div>
    </div>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installContainer').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('installContainer').style.display = 'none';
                deferredPrompt = null;
            }
        });

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + pageId).classList.add('active');
        }
        
        // Ауа-райы мен Намаз уақыты функцияларын осында қосуға болады
    </script>
</body>
</html>
