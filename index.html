<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATYR INFO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #007aff; --bg-color: #f2f4f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding: 0; padding-bottom: 70px; -webkit-tap-highlight-color: transparent; }
        .page { display: none; }
        .page.active { display: block; }
        .header-section { background: #007aff; padding: 15px 20px 35px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; text-align: center; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .location-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .lang-switcher { display: flex; gap: 5px; }
        .lang-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .lang-btn.active { background: white !important; color: #007aff !important; }
        .header-title { font-size: 28px; font-weight: 900; margin-bottom: 15px; letter-spacing: 1px; }
        .live-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .live-item { background: rgba(255,255,255,0.15); padding: 5px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; min-width: 90px; justify-content: center; }
        .search-box { background: white; border-radius: 15px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .search-box input { border: none; outline: none; width: 100%; font-size: 14px; color: #333; }
        .add-ad-btn { background: #007aff; color: white; margin: 15px 20px 10px; padding: 12px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-weight: 800; font-size: 14px; box-shadow: 0 4px 12px rgba(0,122,255,0.2); }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 10px 15px; max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 15px 5px; border-radius: 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); height: 100px; justify-content: center; box-sizing: border-box; }
        .card i { font-size: 24px; color: var(--main-blue); margin-bottom: 8px; }
        .card span { font-size: 11px; font-weight: 700; color: #1a1a1a; text-align: center; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #8e8e93; font-size: 11px; font-weight: 700; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--main-blue); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1999; }
        #locationSheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-top-left-radius: 25px; border-top-right-radius: 25px; transition: 0.4s; z-index: 2000; padding: 20px; box-sizing: border-box; }
        #locationSheet.active { bottom: 0; }
        .loc-item { padding: 15px; border-bottom: 1px solid #eee; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="header-section">
            <div class="top-bar">
                <button class="location-btn" onclick="window.toggleSheet(true)">
                    <i class="fas fa-map-marker-alt"></i> <span id="currentLocText">Батыр ауылы</span> <i class="fas fa-chevron-down"></i>
                </button>
                <div class="lang-switcher">
                    <button class="lang-btn active" id="btnKZ" onclick="window.changeLang('kk')">KZ</button>
                    <button class="lang-btn" id="btnRU" onclick="window.changeLang('ru')">RU</button>
                </div>
            </div>
            <div class="header-title">BATYR INFO</div>
            <div class="live-bar">
                <div class="live-item" id="prayerText"><i class="fas fa-mosque"></i> ...</div>
                <div class="live-item" id="weatherText"><i class="fas fa-temperature-high"></i> ...°C</div>
            </div>
            <div class="search-box">
                <i class="fas fa-search" style="color:#888"></i>
                <input type="text" id="searchInput" onkeyup="window.searchCards()" placeholder="Іздеу...">
            </div>
        </div>

        <a href="add.html" class="add-ad-btn">
            <i class="fas fa-plus-circle"></i> <span data-key="addBtnText">Жарнама қосу</span>
        </a>

        <div class="grid" id="mainGrid">
            </div>
    </div>

    <div id="page-market" class="page">
        <div class="header-section"><div class="header-title">МАРКЕТ</div></div>
        <div style="padding: 20px; text-align: center;">Маркет бөлімі дайындалуда...</div>
    </div>

    <div id="page-profile" class="page">
        <div class="header-section"><div class="header-title">ПРОФИЛЬ</div></div>
        <div style="padding: 50px; text-align: center;">Жақында...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="window.showPage('home')">
            <i class="fas fa-home"></i><span data-key="navHome">Басты</span>
        </div>
        <div class="nav-item" id="nav-market" onclick="window.showPage('market')">
            <i class="fas fa-store"></i><span data-key="navMarket">Маркет</span>
        </div>
        <div class="nav-item" id="nav-profile" onclick="window.showPage('profile')">
            <i class="fas fa-user"></i><span data-key="navProfile">Профиль</span>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="window.toggleSheet(false)"></div>
    <div id="locationSheet">
        <div style="font-weight: 900; font-size: 18px; margin-bottom: 15px;">Локация таңдаңыз</div>
        <div class="loc-item" onclick="window.selectLoc('Батыр ауылы')">Батыр ауылы</div>
        <div class="loc-item" onclick="window.selectLoc('Ақтау қаласы')">Ақтау қаласы</div>
        <div class="loc-item" onclick="window.selectLoc('Жаңаөзен қаласы')">Жаңаөзен қаласы</div>
    </div>

    <script type="module">
        import { db } from "./firebase.js";
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const translations = {
            kk: { navHome: "Басты", navMarket: "Маркет", navProfile: "Профиль", addBtnText: "Жарнама қосу", search: "Іздеу...", prayerNames: { Fajr: "Таң", Dhuhr: "Бесін", Asr: "Екінді", Maghrib: "Ақшам", Isha: "Құптан" } },
            ru: { navHome: "Главная", navMarket: "Маркет", navProfile: "Профиль", addBtnText: "Подать объявление", search: "Поиск...", prayerNames: { Fajr: "Фаджр", Dhuhr: "Зухр", Asr: "Аср", Maghrib: "Магриб", Isha: "Иша" } }
        };

        window.currentLang = 'kk';

        // 1. Тіл ауыстыру
        window.changeLang = (lang) => {
            window.currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(lang === 'kk' ? 'btnKZ' : 'btnRU').classList.add('active');
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });
            document.getElementById('searchInput').placeholder = translations[lang].search;
            updateLiveContent();
            loadServices();
        };

        // 2. Беттерді көрсету
        window.showPage = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + pageId).classList.add('active');
            window.scrollTo(0,0);
        };

        // 3. Локация парағы
        window.toggleSheet = (show) => {
            document.getElementById('locationSheet').classList.toggle('active', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        };

        window.selectLoc = (city) => {
            document.getElementById('currentLocText').innerText = city;
            window.toggleSheet(false);
        };

        // 4. Іздеу
        window.searchCards = () => {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "" : "none";
            }
        };

        // 5. Firebase-тен сервистерді алу
        async function loadServices() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '<div style="grid-column: span 3; text-align:center;">Жүктелуде...</div>';
            try {
                const q = query(collection(db, "services"), orderBy("order", "asc"));
                const snap = await getDocs(q);
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const s = doc.data();
                    grid.innerHTML += `
                        <a href="service.html?id=${doc.id}" class="card">
                            <i class="${s.icon}"></i>
                            <span>${window.currentLang === 'kk' ? s.nameKz : s.nameRu}</span>
                        </a>`;
                });
            } catch (e) { console.error(e); grid.innerHTML = "Қате орын алды."; }
        }

        // 6. Намаз және Пагода API
        async function updateLiveContent() {
            // Намаз
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Aktau&country=Kazakhstan&method=2');
                const data = await res.json();
                const t = data.data.timings;
                // Ең жақын намазды анықтау (қарапайым түрі)
                document.getElementById('prayerText').innerHTML = `<i class="fas fa-mosque"></i> Бесін: ${t.Dhuhr}`;
            } catch (e) { console.log("Prayer error", e); }

            // Пагода
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=43.65&longitude=51.17&current_weather=true');
                const data = await res.json();
                document.getElementById('weatherText').innerHTML = `<i class="fas fa-temperature-high"></i> ${Math.round(data.current_weather.temperature)}°C`;
            } catch (e) { console.log("Weather error", e); }
        }

        // Іске қосу
        window.addEventListener('load', () => {
            loadServices();
            updateLiveContent();
        });

    </script>
</body>
</html>
