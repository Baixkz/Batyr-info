<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATYR INFO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #007aff; --bg-color: #f2f4f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 0; overflow-x: hidden; }

        /* HEADER */
        .header-section {
            background: #007aff; padding: 15px 20px 65px;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white;
            position: relative;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .location-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .lang-switcher { display: flex; gap: 6px; }
        .lang-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; }
        .lang-btn.active { background: white !important; color: #007aff !important; }
        .header-title { font-size: 34px; font-weight: 900; text-align: center; margin-bottom: 25px; letter-spacing: 1px; }

        /* SEARCH */
        .search-box { background: white; border-radius: 20px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .search-box input { border: none; outline: none; width: 100%; font-size: 16px; color: #333; }

        /* STORIES-STYLE SERVICESS BANNER (KASPI STYLE) */
        .stories-container {
            padding: 15px 15px 0;
            margin-top: -45px;
            position: relative;
            z-index: 100;
        }
        
        .stories-wrapper {
            display: flex;
            gap: 12px;
            overflow-x: auto; /* Оңға қарай сырғиды */
            scrollbar-width: none; /* Скролл жолағын жасыру */
            padding-bottom: 10px;
        }
        .stories-wrapper::-webkit-scrollbar { display: none; } /* Safari үшін */

        .story-item {
            min-width: 105px;
            height: 125px;
            background: white;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
            flex-shrink: 0;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 12px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .story-item:active { transform: scale(0.95); }

        .story-item img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.65); /* Мәтін көрінуі үшін */
        }

        .story-item span {
            position: relative;
            color: white;
            font-size: 11px;
            font-weight: 900;
            line-height: 1.2;
            z-index: 2;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        }

        /* GRID CATALOG */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 25px 20px; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 25px 10px; border-radius: 28px; text-decoration: none; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.04); transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card i { font-size: 32px; color: var(--main-blue); margin-bottom: 12px; }
        .card span { font-size: 14px; font-weight: 800; color: #1a1a1a; }
        .badge-red { position: absolute; top: 12px; right: 12px; background: #ff3b30; color: white; font-size: 9px; padding: 3px 7px; border-radius: 10px; font-weight: 900; }

        footer { text-align: center; padding: 30px 20px; }
        .footer-logo { font-size: 24px; font-weight: 900; color: #000; text-decoration: none; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="top-bar">
            <button class="location-btn">
                <i class="fas fa-map-marker-alt"></i> <span>Батыр ауылы</span>
            </button>
            <div class="lang-switcher">
                <button class="lang-btn active" id="btnKZ" onclick="changeLang('kk')">KZ</button>
                <button class="lang-btn" id="btnRU" onclick="changeLang('ru')">RU</button>
            </div>
        </div>
        <div class="header-title">BATYR INFO</div>
        <div class="search-box">
            <i class="fas fa-search" style="color:#888"></i>
            <input type="text" id="searchInput" placeholder="Іздеу...">
        </div>
    </div>

    <div class="stories-container">
        <div class="stories-wrapper">
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1557821552-17105176677c?q=80&w=200&h=200&fit=crop">
                <span>BATYR INFO-ға қосылыңыз</span>
            </a>
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=200&h=200&fit=crop">
                <span>Сіздің дүкеніңіз осында</span>
            </a>
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=200&h=200&fit=crop">
                <span>Дәмді тағамдар & жеткізу</span>
            </a>
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1549421263-5ec394a5ad4c?q=80&w=200&h=200&fit=crop">
                <span>Жедел такси қызметі</span>
            </a>
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1521791136364-798a7bc0d262?q=80&w=200&h=200&fit=crop">
                <span>Ауылдағы бос жұмыс орындары</span>
            </a>
            <a href="#" class="story-item">
                <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=200&h=200&fit=crop">
                <span>🔥 Күнделікті ыстық жеңілдіктер</span>
            </a>
        </div>
    </div>

    <div class="grid" id="mainGrid">
        <a href="ads.html" class="card"><span class="badge-red">NEW</span><i class="fas fa-bullhorn"></i><span data-key="ads">Хабарландыру</span></a>
        <a href="shops.html" class="card"><i class="fas fa-shopping-bag"></i><span data-key="shops">Дүкендер</span></a>
        <a href="med.html" class="card"><i class="fas fa-hospital"></i><span data-key="med">Медицина</span></a>
        <a href="edu.html" class="card"><i class="fas fa-graduation-cap"></i><span data-key="edu">Білім</span></a>
        <a href="fun.html" class="card"><i class="fas fa-gamepad"></i><span data-key="fun">Ойын-сауық</span></a>
        <a href="food.html" class="card"><i class="fas fa-utensils"></i><span data-key="food">Тамақтану</span></a>
        <a href="auto.html" class="card"><i class="fas fa-car-side"></i><span data-key="auto">Автоқызмет</span></a>
        <a href="jobs.html" class="card"><i class="fas fa-briefcase"></i><span data-key="jobs">Жұмыс</span></a>
        <a href="transport.html" class="card"><i class="fas fa-truck-moving"></i><span data-key="trans">Транспорт</span></a>
        <a href="bath.html" class="card"><i class="fas fa-hot-tub"></i><span data-key="bath">Монша</span></a>
    </div>

    <footer>
        <a href="index.html" class="footer-logo">BAIX</a>
        <p style="color: #ccc; font-size: 11px; margin-top: 5px;">© 2026 BATYR INFO</p>
    </footer>

    <script>
        const langData = {
            kk: { ads: "Хабарландыру", shops: "Дүкендер", med: "Медицина", edu: "Білім", fun: "Ойын-сауық", food: "Тамақтану", auto: "Автоқызмет", jobs: "Жұмыс", trans: "Транспорт", bath: "Монша", search: "Іздеу..." },
            ru: { ads: "Объявления", shops: "Магазины", med: "Медицина", edu: "Образование", fun: "Развлечения", food: "Питание", auto: "Автосервис", jobs: "Работа", trans: "Транспорт", bath: "Бани", search: "Поиск..." }
        };

        function changeLang(lang) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(lang === 'kk' ? 'btnKZ' : 'btnRU').classList.add('active');
            document.querySelectorAll('[data-key]').forEach(el => { el.innerText = langData[lang][el.getAttribute('data-key')]; });
            document.getElementById('searchInput').placeholder = langData[lang].search;
        }
    </script>
</body>
</html>
