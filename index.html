<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATYR INFO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Сенің стилдерің осы жерде қалады */
        :root { --main-blue: #007aff; --bg-color: #f2f4f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding: 0; padding-bottom: 70px; }
        .page { display: none; }
        .page.active { display: block; }
        .header-section { background: #007aff; padding: 15px 20px 35px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 5px 15px 25px; }
        .card { background: white; padding: 18px 5px; border-radius: 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .card i { font-size: 28px; color: var(--main-blue); margin-bottom: 8px; }
        .card span { font-size: 10.5px; font-weight: 700; color: #1a1a1a; text-align: center; }
        .olx-inner-grid { display: none; grid-column: span 3; grid-template-columns: 1fr 1fr; gap: 10px; }
        .market-header-btn { grid-column: span 3; background: #007aff; color: white; height: 120px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; }
        /* [Қалған стильдеріңді осы араға қоса бер] */
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="header-section">
            <div class="header-title">BATYR INFO</div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" onkeyup="searchCards()" placeholder="Іздеу...">
            </div>
        </div>

        <a href="add.html" class="add-ad-btn">
            <i class="fas fa-plus-circle"></i> <span>Жарнама қосу</span>
        </a>

        <div class="grid" id="mainGrid">
            </div>
    </div>

    <div id="page-market" class="page">
        <div class="header-section">
            <div class="header-title">МАРКЕТ</div>
        </div>
        
        <div class="grid" style="margin-top: 20px;">
            <a href="add.html" class="market-header-btn" style="background: #28a745 !important; height: 80px !important;">
                <i class="fas fa-plus-square"></i> <span>Жарнама беру</span>
            </a>

            <div class="market-header-btn" onclick="toggleOlx()">
                <i class="fas fa-bullhorn"></i>
                <span>ХАБАРЛАНДЫРУ</span>
                <i class="fas fa-chevron-down" id="olx-arrow"></i>
            </div>

            <div id="olx-content" class="olx-inner-grid">
                </div>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase.js"; // Сенің Firebase файлың
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // СЕРВИСТЕРДІ ЖҮКТЕУ ФУНКЦИЯСЫ
        async function loadServices() {
            const mainGrid = document.getElementById('mainGrid');
            const olxGrid = document.getElementById('olx-content');

            try {
                const q = query(collection(db, "services"), orderBy("order", "asc"));
                const querySnapshot = await getDocs(q);
                
                mainGrid.innerHTML = '';
                olxGrid.innerHTML = '';

                querySnapshot.forEach((doc) => {
                    const s = doc.data();
                    const cardHtml = `
                        <a href="service.html?id=${doc.id}" class="card ${s.type === 'market-inner' ? 'olx-card' : ''}">
                            <i class="${s.icon}"></i>
                            <span>${currentLang === 'kk' ? s.nameKz : s.nameRu}</span>
                        </a>
                    `;

                    // Егер бұл Маркеттің ішіндегі категория болса (Мал базар т.б.)
                    if (s.type === 'market-inner') {
                        olxGrid.innerHTML += cardHtml;
                    } else {
                        // Басты беттің 9 батырмасы
                        mainGrid.innerHTML += cardHtml;
                    }
                });
            } catch (e) {
                console.error("Error loading services: ", e);
            }
        }

        // Бет жүктелгенде іске қосу
        window.addEventListener('DOMContentLoaded', () => {
            loadServices();
            // Басқа функциялар (Weather, Prayer)
        });
    </script>
</body>
</html>
