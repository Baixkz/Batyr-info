<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Құрылыс заттары - BATYR INFO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main-blue: #007aff; --bg-color: #f2f4f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 0; }

        /* HEADER */
        .header {
            background: var(--main-blue); padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between; color: white;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; }
        .header h2 { margin: 0; font-size: 16px; font-weight: 800; }

        .lang-switcher { display: flex; gap: 5px; }
        .lang-btn { 
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); 
            color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer;
        }
        .lang-btn.active { background: white !important; color: var(--main-blue) !important; }

        /* GRID (2 ҮЛКЕН КАРТОЧКА) */
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; /* Ауыл адамдарына ыңғайлы болу үшін тігінен үлкен қылдық */
            gap: 15px; padding: 20px; max-width: 500px; margin: 0 auto; 
        }
        .card {
            background: white; padding: 30px 15px; border-radius: 25px; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.2s; min-height: 160px; box-sizing: border-box;
        }
        .card:active { transform: scale(0.96); }

        /* ИКОНКАЛАР (КӨК ТҮСТІ, ҮЛКЕН) */
        .emoji { 
            font-size: 65px; 
            margin-bottom: 12px; 
            display: block;
            filter: invert(34%) sepia(85%) saturate(2853%) hue-rotate(199deg) brightness(101%) contrast(106%);
        }
        .card span:not(.emoji) { font-size: 16px; font-weight: 800; color: #1a1a1a; text-align: center; }

        /* WHATSAPP БАТЫРМАСЫ */
        .wa-btn-container { padding: 10px 20px 30px; max-width: 500px; margin: 0 auto; }
        .wa-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #25D366; color: white; padding: 18px; border-radius: 15px; 
            text-decoration: none; font-weight: 800; font-size: 15px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="olx.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h2 id="pageTitle">Құрылыс заттары</h2>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn active" id="btnKZ" onclick="changeLang('kk')">KZ</button>
            <button class="lang-btn" id="btnRU" onclick="changeLang('ru')">RU</button>
        </div>
    </div>

    <div class="grid">
        <a href="#" class="card">
            <span class="emoji">🏗️</span>
            <span data-key="materials">Құрылыс материалдары</span>
        </a>

        <a href="#" class="card">
            <span class="emoji">🛠️</span>
            <span data-key="tools">Құрал-сайман</span>
        </a>
    </div>

    <div class="wa-btn-container">
        <a href="https://wa.me/77XXXXXXXXX" class="wa-btn">
            <i class="fab fa-whatsapp" style="font-size: 24px;"></i> <span data-key="add">Хабарландыру беру</span>
        </a>
    </div>

    <script>
        const langData = {
            kk: { 
                title: "Құрылыс заттары", 
                materials: "Құрылыс материалдары", 
                tools: "Құрал-сайман (Инструменты)", 
                add: "Хабарландыру беру" 
            },
            ru: { 
                title: "Стройматериалы", 
                materials: "Строительные материалы", 
                tools: "Инструменты и техника", 
                add: "Подать объявление" 
            }
        };

        function changeLang(lang) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(lang === 'kk' ? 'btnKZ' : 'btnRU').classList.add('active');
            document.getElementById('pageTitle').innerText = langData[lang].title;
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                el.innerText = langData[lang][key];
            });
        }
    </script>
</body>
</html>
