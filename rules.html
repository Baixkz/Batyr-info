<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панель - BATYR INFO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; padding: 20px; color: #1a1a1a; }
        .container { background: white; padding: 30px; border-radius: 24px; max-width: 650px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; font-weight: 800; }
        .back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #007bff; font-weight: bold; }
        .ad-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 15px; background: #fff; }
        .ad-card img { width: 100%; border-radius: 10px; margin-bottom: 10px; max-height: 300px; object-fit: cover; background: #eee; }
        .btn-group { display: flex; gap: 10px; }
        .btn-ok { background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .version-tag { text-align: center; font-size: 12px; color: #ccc; margin-top: 40px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back">← Артқа / Назад</a>
    
    <div id="user-view" style="text-align:center; padding: 50px 0;">
        <h2>КҮТҮ ЖЕКЕСІ</h2>
        <p>Админ панельге кіру үшін нұсқаны 5 рет басыңыз.</p>
    </div>

    <div id="admin-panel" style="display:none;">
        <h2 style="color: #000;">ДИРЕКТОР ПАНЕЛІ</h2>
        <div id="ads-list">Деректер жүктелуде...</div>
    </div>

    <div class="version-tag" id="secret-trigger">Версия 1.0.4</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCaIwrxsSc4s4SV_sIfOwcGaeB6obdpuzE",
      authDomain: "batyr-final.firebaseapp.com",
      projectId: "batyr-final",
      storageBucket: "batyr-final.firebasestorage.app",
      messagingSenderId: "621519255228",
      appId: "1:621519255228:web:6087e026a6db84afa2c2b9"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let clicks = 0;
    document.getElementById('secret-trigger').addEventListener('click', function() {
        clicks++;
        if (clicks === 5) {
            let p = prompt("Құпия кілтті енгізіңіз:");
            if (p === "01012027") {
                document.getElementById('user-view').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadAds();
            } else {
                alert("Қате код!");
            }
            clicks = 0;
        }
        setTimeout(() => { clicks = 0; }, 3000);
    });

    function loadAds() {
        const list = document.getElementById('ads-list');
        
        // Мұнда .where() шартын алып тастадық, енді БАРЛЫҚ жарнама шығады
        db.collection("ads").onSnapshot(snap => {
            if (snap.empty) {
                list.innerHTML = "<p style='text-align:center;'>Жарнамалар табылмады.</p>";
                return;
            }
            
            list.innerHTML = ""; 
            snap.forEach(doc => {
                const ad = doc.data();
                let photo = 'https://via.placeholder.com/300?text=Сурет+жоқ';
                if (ad.images && Array.isArray(ad.images) && ad.images.length > 0) {
                    photo = ad.images[0]; 
                }

                // Статус түсін анықтау
                const isPending = ad.status === 'pending';
                const badgeColor = isPending ? '#ffc107' : '#28a745';
                const badgeText = isPending ? 'КҮТУДЕ' : 'БЕЛСЕНДІ';

                list.innerHTML += `
                    <div class="ad-card">
                        <span class="status-badge" style="background:${badgeColor}; color:white;">${badgeText}</span>
                        <img src="${photo}" alt="photo">
                        <p><b>Тақырыбы:</b> ${ad.title || 'Жоқ'}</p>
                        <p><b>Телефон:</b> ${ad.phone || 'Жоқ'}</p>
                        <p><b>Баға:</b> ${ad.price || 0} тг</p>
                        <div class="btn-group">
                            ${isPending ? `<button class="btn-ok" onclick="updateStatus('${doc.id}', 'active')">Мақұлдау</button>` : ''}
                            <button class="btn-del" onclick="deleteAd('${doc.id}')">Өшіру</button>
                        </div>
                    </div>`;
            });
        }, error => {
            list.innerHTML = `<p style="color:red;">Қате: ${error.message}</p>`;
        });
    }

    function updateStatus(id, newStatus) {
        db.collection("ads").doc(id).update({ status: newStatus })
        .then(() => alert("Жарнама мақұлданды!"))
        .catch(err => alert("Қате: " + err.message));
    }

    function deleteAd(id) {
        if(confirm("Өшіруге сенімдісіз бе?")) {
            db.collection("ads").doc(id).delete();
        }
    }
</script>
</body>
</html>
