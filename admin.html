<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATYR INFO - Директор Панелі</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; color: #1a1a1a; line-height: 1.6; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 30px; max-width: 500px; margin: 20px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .back { display: block; text-decoration: none; color: #007aff; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        
        /* Тіл және Оферта */
        .lang-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .lang-btn { padding: 8px 18px; border: none; background: #eee; border-radius: 12px; cursor: pointer; font-weight: bold; color: #666; }
        .lang-btn.active { background: #007aff; color: white; }
        .content { display: none; }
        .content.active { display: block; }
        
        /* Админ Панель */
        #admin-panel { display: none; }
        .admin-nav { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #eee; overflow-x: auto; padding-bottom: 5px; }
        .nav-tab { padding: 10px 15px; cursor: pointer; font-weight: bold; color: #999; font-size: 13px; white-space: nowrap; }
        .nav-tab.active { color: #007aff; border-bottom: 3px solid #007aff; }

        /* Формалар */
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 20px; }
        input, select, textarea { padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 14px; }
        .btn-main { background: #007aff; color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        
        /* Тізімдер */
        .list-item { background: #fff; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; font-size: 14px; }
        .edit-btn { color: #007aff; margin-right: 10px; cursor: pointer; font-weight: bold; border: none; background: none; }
        .del-btn { color: #d9534f; cursor: pointer; font-weight: bold; border: none; background: none; }

        .copyright { text-align: center; font-size: 11px; color: #bbb; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .version-tag { text-align: center; font-size: 11px; color: #eee; margin-top: 40px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back">← Артқа</a>
    
    <div id="user-view">
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('kz')">ҚАЗАҚША</button>
            <button class="lang-btn" onclick="setLang('ru')">РУССКИЙ</button>
        </div>
        <div id="kz" class="content active">
            <h2 style="text-align:center; color:#d9534f">ПАЙДАЛАНУ ШАРТТАРЫ</h2>
            <p><b>BATYR INFO</b> — ақпараттық каталог. 2026.</p>
        </div>
        <div id="ru" class="content">
            <h2 style="text-align:center; color:#d9534f">ПОЛЬЗОВАТЕЛЬСКОЕ СОГЛАШЕНИЕ</h2>
            <p><b>BATYR INFO</b> — информационный каталог. 2026.</p>
        </div>
    </div>

    <div id="admin-panel">
        <h2 style="text-align:center; color: #007aff;">ДИРЕКТОР ПАНЕЛІ</h2>
        
        <div class="admin-nav">
            <div class="nav-tab active" onclick="switchAdminTab('cats', this)">Бөлімдер</div>
            <div class="nav-tab" onclick="switchAdminTab('ads-add', this)">Жарнама +</div>
            <div class="nav-tab" onclick="switchAdminTab('pending', this)">Күтуде</div>
        </div>

        <div id="cats" class="admin-section active">
            <div class="form-group" id="cat-form">
                <h4 id="form-title" style="margin:0">Жаңа бөлім қосу</h4>
                <input type="hidden" id="edit-id">
                <input type="text" id="cat-name" placeholder="Аты (мысалы: Такси)">
                <input type="text" id="cat-icon" placeholder="Иконка (бос болса - автоматты)">
                
                <select id="cat-page-target">
                    <option value="home">Басты бетке (1-ші бет)</option>
                    <option value="market">Маркетке (2-ші бет)</option>
                    <option value="other">Таңдаулыға (3-ші бет)</option>
                </select>

                <select id="cat-parent">
                    <option value="root">-- БАСТЫ БӨЛІМ --</option>
                </select>
                
                <button class="btn-main" id="cat-btn" onclick="saveCategory()">САҚТАУ</button>
                <button class="btn-main" id="cancel-edit" style="background:#888; display:none; margin-top:5px;" onclick="resetCatForm()">БАС ТАРТУ</button>
            </div>
            <div id="cats-list">Жүктелуде...</div>
        </div>

        <div id="ads-add" class="admin-section">
            <div class="form-group">
                <select id="ad-cat-select"><option value="">Бөлімді таңдаңыз...</option></select>
                <input type="text" id="ad-title" placeholder="Тақырыбы">
                <input type="number" id="ad-price" placeholder="Бағасы">
                <input type="tel" id="ad-phone" placeholder="Телефон">
                <textarea id="ad-desc" placeholder="Сипаттамасы"></textarea>
                <button class="btn-main" onclick="saveAd()">ШЫҒАРУ</button>
            </div>
        </div>

        <div id="ads-manage" class="admin-section">
            <div id="ads-display">Жүктелуде...</div>
        </div>

    </div>

    <p class="copyright">© 2026 BATYR INFO</p>
    <div class="version-tag" id="secret-trigger">Версия 1.0.8</div>
</div>

<script src="app.js"></script>
<script>
    function setLang(lang) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.getElementById(lang).classList.add('active');
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    let secretClicks = 0;
    document.getElementById('secret-trigger').addEventListener('click', function() {
        secretClicks++;
        if (secretClicks === 7) {
            let pass = prompt("Админ паролі:");
            if (pass === "01012027") {
                document.getElementById('user-view').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                syncAdminData();
            }
            secretClicks = 0;
        }
        setTimeout(() => secretClicks = 0, 5000);
    });

    function switchAdminTab(target, el) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        
        if (target === 'pending') {
            document.getElementById('ads-manage').classList.add('active');
            loadAdsForManage();
        } else {
            document.getElementById(target).classList.add('active');
        }
    }

    // КАТЕГОРИЯ САҚТАУ (ҚОСУ ЖӘНЕ ӨҢДЕУ)
    async function saveCategory() {
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('cat-name').value;
        const icon = document.getElementById('cat-icon').value || "";
        const page = document.getElementById('cat-page-target').value;
        const parentId = document.getElementById('cat-parent').value;

        if(!name) return alert("Атын жаз!");

        const data = {
            name: name,
            icon: icon,
            page: page,
            parentId: parentId,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(id) {
            await db.collection("categories").doc(id).update(data);
            alert("Өзгертілді!");
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection("categories").add(data);
            alert("Қосылды!");
        }
        resetCatForm();
    }

    function resetCatForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('cat-name').value = "";
        document.getElementById('cat-icon').value = "";
        document.getElementById('form-title').innerText = "Жаңа бөлім қосу";
        document.getElementById('cat-btn').innerText = "САҚТАУ";
        document.getElementById('cancel-edit').style.display = "none";
    }

    function editCategory(id, name, icon, page, parentId) {
        document.getElementById('edit-id').value = id;
        document.getElementById('cat-name').value = name;
        document.getElementById('cat-icon').value = icon;
        document.getElementById('cat-page-target').value = page;
        document.getElementById('cat-parent').value = parentId;
        
        document.getElementById('form-title').innerText = "Бөлімді өңдеу";
        document.getElementById('cat-btn').innerText = "ӨЗГЕРТУ";
        document.getElementById('cancel-edit').style.display = "block";
        window.scrollTo(0,0);
    }

    function syncAdminData() {
        db.collection("categories").onSnapshot(snap => {
            const parentSelect = document.getElementById('cat-parent');
            const adCatSelect = document.getElementById('ad-cat-select');
            const catsList = document.getElementById('cats-list');
            
            parentSelect.innerHTML = '<option value="root">-- БАСТЫ БӨЛІМ --</option>';
            adCatSelect.innerHTML = '<option value="">Бөлімді таңдаңыз...</option>';
            catsList.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                const pageLabel = d.page === 'home' ? '🏠' : (d.page === 'market' ? '🛍️' : '⭐');
                
                parentSelect.innerHTML += `<option value="${doc.id}">${d.name}</option>`;
                adCatSelect.innerHTML += `<option value="${doc.id}">${d.name}</option>`;
                
                catsList.innerHTML += `
                    <div class="list-item">
                        <span>${pageLabel} ${d.parentId === 'root' ? '' : '↳'} ${d.name}</span>
                        <div>
                            <button class="edit-btn" onclick="editCategory('${doc.id}', '${d.name}', '${d.icon}', '${d.page}', '${d.parentId}')">өңдеу</button>
                            <button class="del-btn" onclick="deleteDoc('categories', '${doc.id}')">өшіру</button>
                        </div>
                    </div>`;
            });
        });
    }

    async function saveAd() {
        const adData = {
            category: document.getElementById('ad-cat-select').value,
            title: document.getElementById('ad-title').value,
            price: document.getElementById('ad-price').value,
            phone: document.getElementById('ad-phone').value,
            desc: document.getElementById('ad-desc').value,
            status: "active",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(!adData.category || !adData.title) return alert("Толық толтыр!");
        await db.collection("ads").add(adData);
        alert("Жарнама шықты!");
    }

    function loadAdsForManage() {
        const container = document.getElementById('ads-display');
        container.innerHTML = "Жүктелуде...";
        db.collection("ads").orderBy("createdAt", "desc").onSnapshot(snap => {
            container.innerHTML = "";
            snap.forEach(doc => {
                const ad = doc.data();
                container.innerHTML += `
                    <div class="list-item">
                        <span>${ad.title} (${ad.status})</span>
                        <button class="del-btn" onclick="deleteDoc('ads', '${doc.id}')">өшіру</button>
                    </div>`;
            });
        });
    }

    function deleteDoc(col, id) { if(confirm("Өшіруді растайсыз ба?")) db.collection(col).doc(id).delete(); }
</script>
</body>
</html>
