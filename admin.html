<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATYR INFO - Директор Панелі</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #001fcc; --bg-color: #f4f7f9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); padding: 15px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 25px; max-width: 600px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .back-btn { text-decoration: none; color: var(--main-blue); font-weight: bold; font-size: 14px; }

        /* ТАБТАР */
        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .nav-tab { padding: 10px 18px; cursor: pointer; font-weight: 800; color: #999; font-size: 13px; background: #eee; border-radius: 12px; white-space: nowrap; transition: 0.3s; }
        .nav-tab.active { background: var(--main-blue); color: white; }

        /* ФОРМАЛАР */
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .form-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 20px; border: 1px solid #eee; }
        
        input, select, textarea { padding: 14px; border-radius: 12px; border: 1px solid #ddd; font-size: 14px; outline: none; }
        input:focus { border-color: var(--main-blue); }
        
        .btn-save { background: var(--main-blue); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 15px; }
        .btn-cancel { background: #888; color: white; border: none; padding: 10px; border-radius: 12px; margin-top: 5px; cursor: pointer; }

        /* ТІЗІМДЕР */
        .item-row { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .item-info { display: flex; align-items: center; gap: 12px; }
        .item-info i { font-size: 20px; color: var(--main-blue); width: 25px; text-align: center; }
        .actions { display: flex; gap: 10px; }
        .edit-btn { color: #007aff; border: none; background: none; font-weight: 700; cursor: pointer; }
        .del-btn { color: #d9534f; border: none; background: none; font-weight: 700; cursor: pointer; }

        /* БАННЕРЛЕР */
        .banner-preview { width: 100%; height: 80px; background-size: cover; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-view">
        <h2 style="text-align:center;">BATYR INFO</h2>
        <p style="text-align:center; color:#666;">Пайдалану шарттары</p>
        <div style="background:#f9f9f9; padding:15px; border-radius:15px; font-size:13px; color:#444; margin-bottom:20px;">
            Осы қосымшаны пайдалану арқылы сіз ережелермен келісесіз. <span onclick="triggerAdmin()" style="color:#eee">v1.0.8</span>
        </div>
        <a href="index.html" class="btn-save" style="display:block; text-decoration:none; text-align:center;">БАСТЫ БЕТКЕ ҚАЙТУ</a>
    </div>

    <div id="admin-view" style="display:none;">
        <div class="header-admin">
            <h2 style="margin:0; color: var(--main-blue);">ДИРЕКТОР</h2>
            <a href="index.html" class="back-btn">Шығу</a>
        </div>

        <div class="admin-nav">
            <div class="nav-tab active" onclick="switchTab('cats-tab', this)">Бөлімдер</div>
            <div class="nav-tab" onclick="switchTab('ads-tab', this)">Жарнамалар</div>
            <div class="nav-tab" onclick="switchTab('banners-tab', this)">Баннерлер (3с)</div>
        </div>

        <div id="cats-tab" class="admin-section active">
            <div class="form-group">
                <h4 id="cat-title" style="margin:0">Жаңа бөлім қосу</h4>
                <input type="hidden" id="edit-cat-id">
                <input type="text" id="cat-name" placeholder="Бөлім аты (мысалы: Такси)">
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="text" id="cat-icon" placeholder="Иконка (мысалы: fa-taxi)" style="flex:1;">
                    <div id="icon-preview" style="font-size:24px; color:var(--main-blue);"><i class="fas fa-question-circle"></i></div>
                </div>
                <select id="cat-page">
                    <option value="home">Басты бет (1-бет)</option>
                    <option value="market">Маркет (2-бет)</option>
                    <option value="other">Профиль (3-бет)</option>
                </select>
                <select id="cat-parent">
                    <option value="root">-- БАСТЫ БӨЛІМ --</option>
                </select>
                <button class="btn-save" onclick="saveCategory()">САҚТАУ</button>
                <button class="btn-cancel" id="cat-cancel" style="display:none;" onclick="resetCatForm()">БАС ТАРТУ</button>
            </div>
            <div id="cats-list-container">Жүктелуде...</div>
        </div>

        <div id="ads-tab" class="admin-section">
            <div class="form-group">
                <h4>Жарнама қосу</h4>
                <select id="ad-cat-select"><option value="">Бөлімді таңдаңыз...</option></select>
                <input type="text" id="ad-title" placeholder="Тақырыбы">
                <input type="number" id="ad-price" placeholder="Бағасы">
                <input type="tel" id="ad-phone" placeholder="Телефон">
                <textarea id="ad-desc" placeholder="Сипаттамасы"></textarea>
                <button class="btn-save" onclick="saveAd()">ЖАРНАМА ШЫҒАРУ</button>
            </div>
            <div id="ads-list-container">Жүктелуде...</div>
        </div>

        <div id="banners-tab" class="admin-section">
            <div class="form-group">
                <h4>3с Баннер қосу</h4>
                <select id="banner-pos">
                    <option value="home">Басты бет (Жоғарыда)</option>
                    <option value="market">Маркет (Төменде)</option>
                </select>
                <input type="text" id="banner-url" placeholder="Сурет сілтемесі (URL)">
                <input type="text" id="banner-link" placeholder="Басқанда қайда барады? (Сілтеме)">
                <button class="btn-save" onclick="saveBanner()">БАННЕРДІ ҚОСУ</button>
            </div>
            <div id="banners-list-container">Жүктелуде...</div>
        </div>

    </div>
</div>

<script src="app.js"></script>
<script>
    // АДМИНГЕ КІРУ
    let clicks = 0;
    function triggerAdmin() {
        clicks++;
        if(clicks === 7) {
            let p = prompt("Құпия код:");
            if(p === "0101") {
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('admin-view').style.display = 'block';
                initAdmin();
            }
            clicks = 0;
        }
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    // ИКОНКАНЫ АЛДЫН-АЛА КӨРУ
    document.getElementById('cat-icon').addEventListener('input', (e) => {
        const val = e.target.value || 'fa-question-circle';
        document.getElementById('icon-preview').innerHTML = `<i class="fas ${val}"></i>`;
    });

    // КАТЕГОРИЯ САҚТАУ
    async function saveCategory() {
        const id = document.getElementById('edit-cat-id').value;
        const data = {
            name: document.getElementById('cat-name').value,
            icon: document.getElementById('cat-icon').value,
            page: document.getElementById('cat-page').value,
            parentId: document.getElementById('cat-parent').value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(!data.name) return alert("Атын жаз!");

        if(id) {
            await db.collection("categories").doc(id).update(data);
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection("categories").add(data);
        }
        resetCatForm();
    }

    function resetCatForm() {
        document.getElementById('edit-cat-id').value = "";
        document.getElementById('cat-name').value = "";
        document.getElementById('cat-icon').value = "";
        document.getElementById('cat-title').innerText = "Жаңа бөлім қосу";
        document.getElementById('cat-cancel').style.display = "none";
    }

    function editCat(id, name, icon, page, parent) {
        document.getElementById('edit-cat-id').value = id;
        document.getElementById('cat-name').value = name;
        document.getElementById('cat-icon').value = icon;
        document.getElementById('cat-page').value = page;
        document.getElementById('cat-parent').value = parent;
        document.getElementById('cat-title').innerText = "Бөлімді өңдеу";
        document.getElementById('cat-cancel').style.display = "block";
        document.getElementById('icon-preview').innerHTML = `<i class="fas ${icon || 'fa-question-circle'}"></i>`;
    }

    // БАННЕР САҚТАУ
    async function saveBanner() {
        const data = {
            position: document.getElementById('banner-pos').value,
            url: document.getElementById('banner-url').value,
            link: document.getElementById('banner-link').value,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(!data.url) return alert("Сурет сілтемесін қой!");
        await db.collection("banners").add(data);
        alert("Баннер қосылды!");
    }

    // ДЕРЕКТЕРДІ СИНХРОНДАУ
    function initAdmin() {
        // Категориялар тізімі
        db.collection("categories").onSnapshot(snap => {
            const list = document.getElementById('cats-list-container');
            const parentSelect = document.getElementById('cat-parent');
            const adCatSelect = document.getElementById('ad-cat-select');
            
            list.innerHTML = "";
            parentSelect.innerHTML = '<option value="root">-- БАСТЫ БӨЛІМ --</option>';
            adCatSelect.innerHTML = '<option value="">Бөлімді таңдаңыз...</option>';

            snap.forEach(doc => {
                const d = doc.data();
                const icon = d.icon || 'fa-folder';
                const pageIcon = d.page === 'home' ? '🏠' : (d.page === 'market' ? '🛍️' : '👤');
                
                parentSelect.innerHTML += `<option value="${doc.id}">${d.name}</option>`;
                adCatSelect.innerHTML += `<option value="${doc.id}">${d.name}</option>`;

                list.innerHTML += `
                    <div class="item-row">
                        <div class="item-info">
                            <i>${pageIcon}</i>
                            <span><b>${d.name}</b> <br><small>${d.parentId === 'root' ? 'Басты' : 'Ішкі'}</small></span>
                        </div>
                        <div class="actions">
                            <button class="edit-btn" onclick="editCat('${doc.id}','${d.name}','${d.icon}','${d.page}','${d.parentId}')">өңдеу</button>
                            <button class="del-btn" onclick="deleteDoc('categories','${doc.id}')">өшіру</button>
                        </div>
                    </div>`;
            });
        });

        // Баннерлер тізімі
        db.collection("banners").onSnapshot(snap => {
            const bList = document.getElementById('banners-list-container');
            bList.innerHTML = "";
            snap.forEach(doc => {
                const b = doc.data();
                bList.innerHTML += `
                    <div class="item-row" style="flex-direction:column; align-items:flex-start;">
                        <div style="display:flex; justify-content:space-between; width:100%;">
                            <span><b>${b.position.toUpperCase()}</b> баннері</span>
                            <button class="del-btn" onclick="deleteDoc('banners','${doc.id}')">өшіру</button>
                        </div>
                        <div class="banner-preview" style="background-image:url('${b.url}')"></div>
                    </div>`;
            });
        });

        // Жарнамалар тізімі
        db.collection("ads").orderBy("createdAt", "desc").limit(20).onSnapshot(snap => {
            const aList = document.getElementById('ads-list-container');
            aList.innerHTML = "";
            snap.forEach(doc => {
                const a = doc.data();
                aList.innerHTML += `
                    <div class="item-row">
                        <span>${a.title} <br><small>${a.price} ₸</small></span>
                        <button class="del-btn" onclick="deleteDoc('ads','${doc.id}')">өшіру</button>
                    </div>`;
            });
        });
    }

    function deleteDoc(col, id) {
        if(confirm("Өшіруді растайсыз ба?")) db.collection(col).doc(id).delete();
    }
</script>
</body>
</html>
